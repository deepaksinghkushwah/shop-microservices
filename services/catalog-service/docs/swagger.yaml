basePath: /
definitions:
  handler.AssignAttributeRequest:
    properties:
      attribute_id:
        example: 1
        type: integer
    type: object
  handler.CreateAttributeRequest:
    properties:
      name:
        example: Color
        type: string
      slug:
        example: color
        type: string
    type: object
  handler.CreateAttributeValueRequest:
    properties:
      value:
        example: Red
        type: string
    type: object
  handler.CreateCategoryRequest:
    properties:
      name:
        example: Electronics
        type: string
      parent_id:
        example: 1
        type: integer
      slug:
        example: electronics
        type: string
    type: object
  handler.CreateImageRequest:
    properties:
      is_primary:
        example: true
        type: boolean
      product_id:
        example: 1
        type: integer
      url:
        example: https://example.com/image.jpg
        type: string
    type: object
  handler.CreateProductRequest:
    properties:
      category_id:
        type: integer
      description:
        type: string
      name:
        minLength: 3
        type: string
      price:
        type: number
      slug:
        type: string
    required:
    - category_id
    - name
    - price
    - slug
    type: object
  handler.CreateVariantRequest:
    properties:
      attribute_value_ids:
        example:
        - 1
        - 4
        items:
          type: integer
        type: array
      price:
        example: 99.99
        type: number
      product_id:
        example: 1
        type: integer
      sku:
        example: PROD-001-S
        type: string
      stock:
        example: 100
        type: integer
    type: object
host: localhost:8082
info:
  contact: {}
  description: Product catalog microservice
  title: Catalog Service API
  version: "1.0"
paths:
  /attributes:
    get:
      consumes:
      - application/json
      description: Get all product attributes with their values
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List attributes
      tags:
      - attributes
    post:
      consumes:
      - application/json
      description: Create a new product attribute
      parameters:
      - description: Attribute Data
        in: body
        name: attribute
        required: true
        schema:
          $ref: '#/definitions/handler.CreateAttributeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      summary: Create attribute
      tags:
      - attributes
  /attributes/{id}/values:
    get:
      consumes:
      - application/json
      description: Get all values for a specific attribute
      parameters:
      - description: Attribute ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List attribute values
      tags:
      - attribute-values
    post:
      consumes:
      - application/json
      description: Create a new value for a specific attribute
      parameters:
      - description: Attribute ID
        in: path
        name: id
        required: true
        type: integer
      - description: Attribute Value Data
        in: body
        name: value
        required: true
        schema:
          $ref: '#/definitions/handler.CreateAttributeValueRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      summary: Create attribute value
      tags:
      - attribute-values
  /categories:
    get:
      consumes:
      - application/json
      description: Get all product categories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List categories
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Create a new product category
      parameters:
      - description: Category Data
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/handler.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Create category
      tags:
      - categories
  /product-images:
    get:
      consumes:
      - application/json
      description: Get all product images
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List product images
      tags:
      - product-images
    post:
      consumes:
      - application/json
      description: Create a new product image
      parameters:
      - description: Product Image Data
        in: body
        name: image
        required: true
        schema:
          $ref: '#/definitions/handler.CreateImageRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Create product image
      tags:
      - product-images
  /products:
    get:
      description: Get paginated product list
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List products
      tags:
      - products
    post:
      consumes:
      - application/json
      description: Create a new product
      parameters:
      - description: Product Data
        in: body
        name: product
        required: true
        schema:
          $ref: '#/definitions/handler.CreateProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Create product
      tags:
      - products
  /products/{id}/attributes:
    post:
      consumes:
      - application/json
      description: Assign an existing attribute to a product
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: integer
      - description: Attribute Assignment Data
        in: body
        name: attribute
        required: true
        schema:
          $ref: '#/definitions/handler.AssignAttributeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Assign attribute to product
      tags:
      - product-attributes
  /variants:
    post:
      consumes:
      - application/json
      description: Create a new product variant
      parameters:
      - description: Product Variant Data
        in: body
        name: variant
        required: true
        schema:
          $ref: '#/definitions/handler.CreateVariantRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Create product variant
      tags:
      - variants
swagger: "2.0"
